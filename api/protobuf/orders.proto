syntax = "proto3";

package orders;

option go_package = "github.com/MousaZa/logistics-management/internal/orders";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service OrdersService {
  rpc UpdateStatus(NewStatus) returns (google.protobuf.Empty) {}
}

message NewStatus {
  string status = 1;
}
